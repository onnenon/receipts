name: receipts

x-app: &app
  build:
    context: ..
    dockerfile: Dockerfile
    args:
      SOURCE_BUILT_AT: ${RECEIPTS_BUILT_AT:-unknown}
      SOURCE_VERSION: ${RECEIPTS_VERSION:-unknown}
  image: receipts-app:${RECEIPTS_IMAGE_TAG:-local}
  environment:
    ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
    DATABASE_HOST: postgres
    DATABASE_NAME: ${POSTGRES_DB:-receipts_prod}
    DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    DATABASE_USER: ${POSTGRES_USER:-receipts}
    DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
    DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
    DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:-}
    GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    PHX_BIND_IPV4: "true"
    PHX_HOST: ${PHX_HOST:?PHX_HOST is required}
    POOL_SIZE: ${POOL_SIZE:-10}
    PORT: "4000"
    RIOT_API_KEY: ${RIOT_API_KEY:?RIOT_API_KEY is required}
    SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE is required}
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - receipts

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-receipts_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:-receipts}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-receipts} -d ${POSTGRES_DB:-receipts_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - receipts

  migrate:
    <<: *app
    restart: "no"
    command: ["/app/bin/migrate"]

  web:
    <<: *app
    restart: unless-stopped
    command: ["/app/bin/server"]
    expose:
      - "4000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN:?CLOUDFLARED_TOKEN is required}
    depends_on:
      - web
    networks:
      - receipts

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    networks:
      - receipts

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    networks:
      - receipts

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-receipts}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-receipts_prod}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - receipts

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - postgres_exporter
    networks:
      - receipts

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - receipts

volumes:
  postgres_data:
  loki_data:
  prometheus_data:
  grafana_data:

networks:
  receipts:
    driver: bridge
