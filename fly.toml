# fly.toml app configuration file generated for receipts-drifting-driftwood-9335 on 2026-05-11T05:10:17Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'receipts-drifting-driftwood-9335'
primary_region = 'sjc'
kill_signal = 'SIGTERM'

[build]

[deploy]
  release_command = '/app/bin/migrate'

[env]
  PHX_HOST = 'receipts-drifting-driftwood-9335.fly.dev'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
